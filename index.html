*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f8f9fa;--bg3:#f1f3f5;--bg4:#e9ecef;--text:#1a1a2e;--text2:#6c757d;--text3:#adb5bd;--border:#dee2e6;--border2:#ced4da;--green:#198754;--green-bg:#d1e7dd;--green-text:#0a3622;--red:#dc3545;--red-bg:#f8d7da;--red-text:#58151c;--blue:#0d6efd;--blue-bg:#cfe2ff;--blue-text:#052c65;--yellow:#856404;--yellow-bg:#fff3cd;--yellow-text:#4d3a00;--radius:8px;--radius-lg:12px}
@media(prefers-color-scheme:dark){:root{--bg:#111827;--bg2:#1f2937;--bg3:#374151;--bg4:#4b5563;--text:#f3f4f6;--text2:#9ca3af;--text3:#6b7280;--border:#374151;--border2:#4b5563;--green:#34d399;--green-bg:#064e3b;--green-text:#a7f3d0;--red:#f87171;--red-bg:#7f1d1d;--red-text:#fecaca;--blue:#60a5fa;--blue-bg:#1e3a5f;--blue-text:#bfdbfe;--yellow:#fbbf24;--yellow-bg:#451a03;--yellow-text:#fde68a}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
input,select{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue)}
button{font-family:inherit;cursor:pointer;transition:all .15s}
.btn{background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:7px 14px;border-radius:var(--radius);font-size:13px}
.btn:hover{background:var(--bg2)}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
.btn-blue:hover{filter:brightness(1.1)}
.btn-danger{background:none;border:1px solid var(--red);color:var(--red);padding:4px 10px;border-radius:var(--radius);font-size:12px}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{background:none;border:1px solid var(--border);color:var(--text2);padding:3px 8px;border-radius:var(--radius);font-size:11px}
.btn-sm:hover{border-color:var(--border2);color:var(--text)}
#header{display:flex;justify-content:space-between;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
#header h1{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.acc-inp{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.acc-inp input{width:78px;padding:4px 7px;font-size:12px}
nav{display:flex;border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;background:var(--bg);position:sticky;top:49px;z-index:99;gap:2px}
.tab{padding:9px 14px;background:none;border:none;border-bottom:2.5px solid transparent;font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
main{padding:18px 20px;max-width:1440px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:18px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px}
.card-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-weight:500}
.card-val{font-size:19px;font-weight:600;font-family:ui-monospace,monospace;line-height:1.2}
.card-sub{font-size:11px;color:var(--text2);margin-top:3px}
.card-val.pos{color:var(--green)}.card-val.neg{color:var(--red)}
.panel{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.panel-head{padding:10px 14px;background:var(--bg2);font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.scroll-x{overflow-x:auto}.scroll-y{max-height:460px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 11px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
th:hover{color:var(--text);background:var(--bg3)}
th.sort-asc::after{content:' ↑';color:var(--blue)}th.sort-desc::after{content:' ↓';color:var(--blue)}
td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.num{font-family:ui-monospace,monospace;text-align:right;white-space:nowrap}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text2)}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
.b-buy{background:var(--blue-bg);color:var(--blue)}.b-sell{background:var(--red-bg);color:var(--red)}.b-dep{background:var(--green-bg);color:var(--green)}.b-int{background:var(--yellow-bg);color:var(--yellow)}.b-reb{background:var(--bg3);color:var(--text2)}.b-div{background:var(--green-bg);color:var(--green)}
.form-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;font-weight:500}
.form-hint{font-size:11px;color:var(--text2);margin-top:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius)}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.chip{padding:4px 11px;border-radius:999px;font-size:12px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;transition:all .15s}
.chip.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.chip:hover:not(.active){background:var(--bg2)}
.update-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--radius);font-size:12px;background:var(--bg);border:1px solid var(--border2);color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap}
.update-btn:hover{background:var(--bg2)}
.update-btn.loading{opacity:.65;cursor:wait;pointer-events:none}
.spinner{width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.bar-wrap{height:5px;background:var(--bg4);border-radius:3px;margin-top:3px;overflow:hidden}
.bar{height:100%;border-radius:3px;background:var(--blue)}
.toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:var(--bg);padding:10px 18px;border-radius:var(--radius-lg);font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:360px}
.toast.show{opacity:1;transform:translateY(0)}
.search-inp{padding:6px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;width:160px}
.search-inp:focus{width:200px;border-color:var(--blue)}
.chart-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
@media(max-width:700px){.chart-wrap{grid-template-columns:1fr}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.chart-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:3px 0}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.settings-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.settings-box h3{font-size:13px;font-weight:500;margin-bottom:10px}
.key-row{display:flex;gap:8px}.key-row input{flex:1}
.info-box{background:var(--blue-bg);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--blue-text);margin-top:8px;line-height:1.7}
.warn-box{background:var(--yellow-bg);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--yellow-text);margin-top:8px;line-height:1.7}
@media(max-width:600px){main{padding:12px}#header{padding:10px 14px}.acc-inp{display:none}.cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

async function fetchYahoo(sym){
  const r=await fetch("/api/quote?sym="+encodeURIComponent(sym));
  if(!r.ok)throw new Error("API "+r.status);
  const d=await r.json();
  if(!d[sym]||d[sym].error)throw new Error(d[sym]?.error||"no data");
  return{price:d[sym].price,chg:d[sym].chg};
}
async function fetchAnthropic(syms){
  if(!S.apiKey)throw new Error("no key");
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:"查詢以下美股最新收盤價和今日漲跌，只回傳純 JSON，不要 markdown，格式：{\"TSLA\":{\"price\":384.34,\"chg\":-7.62},...} 股票："+syms.join(",")}]})});
  const d=await r.json(),text=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}
async function updatePrices(){
  if(S.updating)return;
  const syms=S.H.filter(h=>h.shares>0&&!h.sym.includes("Call")&&!h.sym.includes("Put")).map(h=>h.sym);
  if(!syms.length){toast("沒有有效持倉");return}
  S.updating=true;render();
  let results={},failed=[];
  toast("🔄 嘗試 Yahoo Finance…");
  await Promise.all(syms.map(async sym=>{try{results[sym]=await fetchYahoo(sym)}catch{failed.push(sym)}}));
  if(failed.length&&S.apiKey){try{toast("🔄 Yahoo 部分失敗，改用 Anthropic…");Object.assign(results,await fetchAnthropic(failed))}catch{}}
  let n=0;
  S.H=S.H.map(h=>{const r=results[h.sym];if(r){n++;return{...h,price:parseFloat(r.price.toFixed(2)),chg:parseFloat((r.chg||0).toFixed(2))}}return h});
  sv("H");S.updating=false;
  toast(n>0?"✅ 已更新 "+n+" 支股票（"+new Date().toLocaleTimeString()+"）":S.apiKey?"❌ 全部管道失敗，請稍後再試":"❌ 更新失敗，請在設定頁輸入 Anthropic API Key");
  render();
}

function applyTx(tx){
  const{type,sym,shares,price,fee,date,amt}=tx;
  if(!sym||!shares||shares<=0)return true;
  if(type==="買入"){
    const i=S.H.findIndex(h=>h.sym===sym);
    if(i>=0){const h=S.H[i],ns=h.shares+shares,nc=(h.shares*h.cost+shares*price)/ns;S.H=S.H.map((h2,j)=>j===i?{...h2,shares:ns,cost:parseFloat(nc.toFixed(6))}:h2)}
    else S.H=[...S.H,{id:gid(),sym,shares,cost:price,price,chg:0,div:0,realized:0,note:"",fd:date||today()}];
    sv("H");
  }else if(type==="賣出"){
    const i=S.H.findIndex(h=>h.sym===sym);
    if(i<0){toast("⚠️ 找不到 "+sym+" 持倉");return false}
    const h=S.H[i];
    if(shares>h.shares){toast("⚠️ "+sym+" 持有 "+h.shares+" 股，賣出 "+shares+" 股超過持倉！");return false}
    S.H=S.H.map((h2,j)=>j===i?{...h2,shares:Math.max(0,h2.shares-shares),realized:parseFloat(((h2.realized||0)+(price-h2.cost)*shares-(fee||0)).toFixed(2))}:h2);sv("H");
  }else if(type==="配息"&&sym&&amt>0){
    const i=S.H.findIndex(h=>h.sym===sym);
    if(i>=0){S.H=S.H.map((h2,j)=>j===i?{...h2,div:parseFloat(((h2.div||0)+amt).toFixed(2))}:h2);sv("H")}
  }
  return true;
}

function rebuildFromTx(){
  if(!confirm("根據所有交易紀錄重新計算持倉股數、均成本、損益和配息。\n現價、備註保留。確定？"))return;
  const map={};
  [...S.T].sort((a,b)=>a.date.localeCompare(b.date)).forEach(tx=>{
    const{type,sym,shares,price,fee,amt,date}=tx;if(!sym)return;
    if(type==="買入"&&shares>0&&price>0){if(!map[sym])map[sym]={sym,shares:0,cost:0,realized:0,div:0,fd:date};const h=map[sym],ns=h.shares+shares;h.cost=ns>0?(h.shares*h.cost+shares*price)/ns:0;h.shares=ns;if(!h.fd||date<h.fd)h.fd=date}
    else if(type==="賣出"&&shares>0&&price>0&&map[sym]){map[sym].realized+=(price-map[sym].cost)*shares-(fee||0);map[sym].shares=Math.max(0,map[sym].shares-shares)}
    else if(type==="配息"&&amt>0&&map[sym])map[sym].div+=(amt||0);
  });
  S.H=Object.values(map).map(h=>{const ex=S.H.find(e=>e.sym===h.sym);return{id:ex?.id||gid(),sym:h.sym,shares:h.shares,cost:parseFloat(h.cost.toFixed(6)),price:ex?.price||0,chg:ex?.chg||0,div:parseFloat(h.div.toFixed(2)),realized:parseFloat(h.realized.toFixed(2)),note:ex?.note||"",fd:h.fd}});
  sv("H");toast("✅ 從 "+S.T.length+" 筆交易重建完成");render();
}

function render(){
  const ri=document.getElementById("inp-rate"),ci=document.getElementById("inp-cash");
  if(ri&&document.activeElement!==ri)ri.value=S.acc.rate;
  if(ci&&document.activeElement!==ci)ci.value=S.acc.cash;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===S.tab));
  const p=calc(),m=document.getElementById("main");
  if(S.tab==="dash")m.innerHTML=rDash(p);
  else if(S.tab==="holdings")m.innerHTML=rHoldings();
  else if(S.tab==="tx")m.innerHTML=rTx();
  else if(S.tab==="fx")m.innerHTML=rFX();
  else m.innerHTML=rSettings();
  if(S.tab==="dash")requestAnimationFrame(()=>drawChart(p));
  if(S.editPriceId){const el=document.getElementById("ep-"+S.editPriceId);if(el){el.focus();el.select()}}
}

function onAcc(k,v){S.acc={...S.acc,[k]:parseFloat(v)||0};sv("acc");render()}
function saveApiKey(){S.apiKey=document.getElementById("api-key-inp").value.trim();localStorage.setItem("ft_apikey",S.apiKey);toast("✅ API Key 已儲存")}
function sortH(col){S.sortHDir=S.sortHCol===col?S.sortHDir*-1:-1;S.sortHCol=col;render()}
function startEditPrice(id,v){S.editPriceId=id;S.editPriceVal=String(v);render()}

function addHolding(){
  const sym=(document.getElementById("fh-sym").value||"").trim().toUpperCase();
  if(!sym){alert("請輸入股票代號");return}
  const shares=parseFloat(document.getElementById("fh-shares").value)||0,cost=parseFloat(document.getElementById("fh-cost").value)||0,price=parseFloat(document.getElementById("fh-price").value)||0,fd=document.getElementById("fh-fd").value||today();
  const i=S.H.findIndex(h=>h.sym===sym);
  if(i>=0&&shares>0&&cost>0){const h=S.H[i],ns=h.shares+shares,nc=(h.shares*h.cost+shares*cost)/ns;S.H=S.H.map((h2,j)=>j===i?{...h2,shares:ns,cost:parseFloat(nc.toFixed(6)),price:price||h2.price,realized:(h2.realized||0)+(parseFloat(document.getElementById("fh-real").value)||0),note:document.getElementById("fh-note").value||h2.note,fd:h2.fd||fd}:h2);toast("✅ 已合併 "+sym+"（"+ns+" 股，均成本 $"+nc.toFixed(4)+"）")}
  else{S.H=[...S.H,{id:gid(),sym,shares,cost,price:price||cost,chg:parseFloat(document.getElementById("fh-chg").value)||0,div:0,realized:parseFloat(document.getElementById("fh-real").value)||0,note:document.getElementById("fh-note").value,fd}];toast("✅ 已新增 "+sym)}
  sv("H");S.showForm=null;render();
}
function delHolding(id){if(!confirm("確定刪除？"))return;S.H=S.H.filter(h=>h.id!==id);sv("H");render()}

function addTx(){
  const type=document.getElementById("ft-type").value,sym=(document.getElementById("ft-sym").value||"").toUpperCase(),shares=parseFloat(document.getElementById("ft-shares").value)||0,price=parseFloat(document.getElementById("ft-price").value)||0,fee=parseFloat(document.getElementById("ft-fee").value)||0,date=document.getElementById("ft-date").value,amt=parseFloat(document.getElementById("ft-amt").value)||0;
  const t={id:gid(),date,type,sym,shares,price,fee,amt,wire:parseFloat(document.getElementById("ft-wire").value)||0};
  if(applyTx(t)===false)return;
  S.T=[...S.T,t];sv("T");
  const h=S.H.find(h=>h.sym===sym);
  if(type==="買入"&&sym)toast("✅ 買入 "+sym+"，現有 "+(h?.shares||0)+" 股，均成本 $"+fn(h?.cost||0,4));
  else if(type==="賣出"&&sym)toast("✅ 賣出 "+sym+"，剩餘 "+(h?.shares||0)+" 股，已實現 $"+fn(h?.realized||0,2));
  else if(type==="配息"&&sym)toast("✅ 配息 "+sym+"，累積 $"+fn(h?.div||0,2));
  else toast("✅ 已新增交易");
  S.showForm=null;render();
}
